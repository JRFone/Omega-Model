name: Omega native engine and priority diagnostics

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  native-validation:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build and runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_build.txt
      - name: Build and test C++ native engine
        run: python build_native_backend.py --clean
      - name: Run complete Python validation
        run: python -m pytest -q
      - name: Run native parity benchmark
        run: python -m stock_model.native_benchmark
      - name: Run priority diagnostic smoke tests
        run: |
          python omega_cli.py profile Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv k --points 5 --multistarts 1 --workers 1 --output reports/priority/profile_k.json
          python omega_cli.py aspm Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv --age-composition Data_Sets/Data_set_Age_Structured_Demo/age_composition.csv --multistarts 1 --output reports/priority/aspm.json
          python omega_cli.py coverage Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv --replicates 6 --method hessian --workers 1 --output reports/priority/coverage.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: omega-native-priority-${{ matrix.os }}
          path: |
            reports/native_benchmark.json
            reports/priority
            stock_model/native_libs/native_build.json
