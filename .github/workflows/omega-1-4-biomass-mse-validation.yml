name: Omega 1.4 biomass evidence and MSE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  release-1-4-validation:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_build.txt
      - name: Build native C++ engine
        run: python build_native_backend.py --clean
      - name: Run complete release tests
        run: python -m pytest -q
      - name: Run full self-check
        run: python omega_self_check.py --output reports/release_1_4/self_check.json
      - name: Run state-space biomass evidence demonstration
        run: python omega_cli.py biomass-evidence Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv --search-draws 140 --samples 180 --holdout-years 3 --output reports/release_1_4/biomass_evidence.json --dashboard reports/release_1_4/biomass_evidence.html
      - name: Run experimental diagnostic triangulation
        run: python omega_cli.py experimental-diagnostics Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv --search-draws 120 --output reports/release_1_4/experimental_diagnostics.json --dashboard reports/release_1_4/experimental_diagnostics.html
      - name: Run advanced age-structured MSE smoke test
        run: python omega_cli.py advanced-mse Data_Sets/Data_set_Age_Structured_Demo/model_ready_timeseries.csv --age-composition Data_Sets/Data_set_Age_Structured_Demo/age_composition.csv --years 2 --simulations 1 --assessment-mode fast_filter --workers 1 --output reports/release_1_4/advanced_mse.json --dashboard reports/release_1_4/advanced_mse.html
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: omega-1-4-evidence-${{ matrix.os }}
          path: reports/release_1_4
